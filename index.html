<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal API Documentation - Interactive Playground</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    
    <!-- Stoplight Elements CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@stoplight/elements@7.15.3/styles.min.css">
    
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }
        
        .header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .status-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            backdrop-filter: blur(10px);
        }
        
        .api-status {
            background: #10b981;
            color: white;
        }
        
        
        .elements-container {
            height: calc(100vh - 200px);
            overflow: hidden;
        }
        
        .footer {
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: #3b82f6;
            text-decoration: none;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }
        
        .footer-links a:hover {
            background: #dbeafe;
            text-decoration: none;
        }
        
        .report-issue {
            position: fixed;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            background: #ef4444;
            color: white;
            padding: 0.75rem;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            text-decoration: none;
            font-size: 1.25rem;
            z-index: 1000;
            transition: all 0.2s;
        }
        
        .report-issue:hover {
            background: #dc2626;
            transform: translateY(-50%) scale(1.05);
            text-decoration: none;
            color: white;
        }
        
        .report-issue:after {
            content: "Report Issue";
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%);
            background: #1f2937;
            color: white;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-right: 0.5rem;
        }
        
        .report-issue:hover:after {
            opacity: 1;
        }
        
        /* Stoplight Elements customization */
        elements-api {
            --elements-primary-color: #667eea;
            --elements-accent-color: #764ba2;
        }
        
        /* Ensure code samples are visible */
        elements-api::part(code-sample),
        elements-api [class*="CodeSample"],
        elements-api [class*="code-sample"] {
            display: block !important;
            visibility: visible !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Portal API Documentation</h1>
        <p>Interactive Playground with Try It functionality</p>
        <div id="api-status" class="status-badge">🔄 Checking API Status...</div>
    </div>

    <!-- Floating Report Issue Button -->
    <a href="https://github.com/Work-Ninjas/portal-api-docs/issues" target="_blank" class="report-issue" title="Report an issue with documentation">
        🐛
    </a>

    <div class="elements-container">
        <elements-api
            id="docs"
            apiDescriptionUrl="/openapi/openapi.yaml"
            router="hash"
            layout="sidebar"
            hideSchemas="false"
            hideDownloadButton="false"
            hideExport="false"
            hideRequestSamples="false"
            hideResponseSamples="false"
            tryItCorsProxy=""
            logo="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>"
        />
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="./docs/getting-api-key.md">🔑 Get API Key</a>
            <a href="https://github.com/Work-Ninjas/portal-api-docs/issues" target="_blank">📝 Report Issue</a>
            <a href="mailto:api-support@datahubportal.com">📧 Email Support</a>
            <a href="https://api.datahubportal.com/v1/health" target="_blank">💚 API Status</a>
        </div>
        <div>
            Portal API Documentation • Response time: 24h (business days) • 
            <a href="mailto:api-support@datahubportal.com">api-support@datahubportal.com</a>
        </div>
    </footer>

    <!-- Stoplight Elements JS -->
    <script src="https://unpkg.com/@stoplight/elements@7.15.3/web-components.min.js"></script>
    
    <script>
        // Check API health status
        async function checkAPIHealth() {
            try {
                const response = await fetch('https://api.datahubportal.com/v1/health');
                const data = await response.json();
                
                const statusElement = document.getElementById('api-status');
                
                if (response.ok && data.status === 'healthy') {
                    statusElement.textContent = '✅ API Online & Healthy';
                    statusElement.className = 'status-badge api-status';
                } else {
                    statusElement.textContent = '⚠️ API Issues Detected';
                    statusElement.style.background = '#f59e0b';
                }
            } catch (error) {
                console.warn('Unable to check API status:', error);
                const statusElement = document.getElementById('api-status');
                statusElement.textContent = '❌ API Status Unknown';
                statusElement.style.background = '#ef4444';
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            checkAPIHealth();
            
            // Update API status every 5 minutes
            setInterval(checkAPIHealth, 5 * 60 * 1000);
        });

        // Wait for Stoplight Elements to load and check code samples
        document.addEventListener('DOMContentLoaded', () => {
            const elementsApi = document.getElementById('docs');
            
            // Multiple attempts to find and show code samples
            function findCodeSamples(attempt = 1) {
                const selectors = [
                    '[class*="code"]',
                    '[class*="sample"]', 
                    '[class*="CodeSample"]',
                    '[class*="request-sample"]',
                    '[class*="RequestSample"]',
                    '[data-testid*="code"]',
                    '[data-testid*="sample"]',
                    '.sl-panel__content pre',
                    'elements-api [role="tabpanel"]'
                ];
                
                const allSelectors = selectors.join(', ');
                const codeSamples = document.querySelectorAll(allSelectors);
                console.log(`Attempt ${attempt} - Code samples found:`, codeSamples.length);
                
                if (codeSamples.length > 0) {
                    console.log('✅ Code samples loaded with Stoplight Elements!');
                    // Make sure they're visible
                    codeSamples.forEach(sample => {
                        sample.style.display = 'block';
                        sample.style.visibility = 'visible';
                    });
                    return true;
                } else if (attempt < 4) {
                    // Try again with longer delay
                    setTimeout(() => findCodeSamples(attempt + 1), 2000 * attempt);
                } else {
                    console.warn('⚠️ No code samples found after multiple attempts');
                    // Log the DOM structure for debugging
                    const elementsContent = document.querySelector('elements-api');
                    if (elementsContent) {
                        console.log('Elements API shadow DOM:', elementsContent);
                    }
                }
                return false;
            }
            
            // Start checking after Elements loads
            setTimeout(() => findCodeSamples(1), 2000);
        });
    </script>
</body>
</html>
