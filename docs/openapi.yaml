openapi: 3.0.3
info:
  title: Portal API
  description: |
    Portal API provides secure access to contact, job, and file management resources.
    This API uses bearer token authentication and multi-tenant architecture.
    
    **Getting Started:**
    1. [Get your API key](https://docs.datahubportal.com/docs/getting-api-key.html)
    2. Try endpoints in the interactive playground below
    3. Review rate limiting and error handling guidelines
  version: 1.0.0
  termsOfService: https://datahubportal.com/terms
  contact:
    name: API Support Team
    email: api-support@datahubportal.com
    url: https://docs.datahubportal.com
  license:
    name: Proprietary License
    url: https://datahubportal.com/license
  x-logo:
    url: data:image/svg+xml;base64,
    altText: Portal API Logo
    
servers:
  - url: https://api.datahubportal.com/v1
    description: Production server
  - url: https://api.staging.datahubportal.com/v1
    description: Staging server  
  - url: http://localhost:3000/v1
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Contacts
    description: Contact management operations
  - name: Jobs
    description: Job and work order operations
  - name: Files
    description: File and document management

x-tagGroups:
  - name: Contacts
    tags:
      - Contacts
  - name: Jobs
    tags:
      - Jobs
  - name: Files
    tags:
      - Files

paths:
  /v1/contacts:
    get:
      tags:
        - Contacts
      summary: List contacts
      description: Returns a paginated list of contacts for the authenticated tenant
      operationId: listContacts
      x-codeSamples:
        - lang: curl
          source: |
            # Basic request with pagination
            curl -X GET "https://api.datahubportal.com/v1/contacts?limit=25&offset=0" \
              -H "Authorization: Bearer YOUR_API_TOKEN" \
              -H "Content-Type: application/json"
              
            # Handle 429 rate limiting with retry
            curl -X GET "https://api.datahubportal.com/v1/contacts?limit=25" \
              -H "Authorization: Bearer YOUR_API_TOKEN" \
              -H "Content-Type: application/json" \
              --retry 3 \
              --retry-delay 5 \
              --retry-max-time 60
        - lang: javascript
          source: |
            async function fetchContactsWithRetry(limit = 25, offset = 0) {
              const maxRetries = 3;
              let retries = 0;
              
              while (retries < maxRetries) {
                try {
                  const response = await fetch(`https://api.datahubportal.com/v1/contacts?limit=${limit}&offset=${offset}`, {
                    method: 'GET',
                    headers: {
                      'Authorization': 'Bearer YOUR_API_TOKEN',
                      'Content-Type': 'application/json'
                    }
                  });
                  
                  if (response.status === 429) {
                    const retryAfter = response.headers.get('retry-after') || '5';
                    console.log(`Rate limited, retrying after ${retryAfter}s...`);
                    await new Promise(resolve => setTimeout(resolve, parseInt(retryAfter) * 1000));
                    retries++;
                    continue;
                  }
                  
                  if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                  }
                  
                  const data = await response.json();
                  
                  // Handle pagination
                  console.log(`Got ${data.data.length} contacts (${data.pagination.total} total)`);
                  return data;
                  
                } catch (error) {
                  console.error('Request failed:', error);
                  if (++retries >= maxRetries) throw error;
                  await new Promise(resolve => setTimeout(resolve, 2000 * retries));
                }
              }
            }
            
            // Usage
            const contacts = await fetchContactsWithRetry(25, 0);
        - lang: python
          source: |
            import requests
            import time
            from typing import Dict, Any
            
            def fetch_contacts_with_retry(limit: int = 25, offset: int = 0, max_retries: int = 3) -> Dict[Any, Any]:
                """Fetch contacts with automatic retry for rate limiting."""
                
                headers = {
                    'Authorization': 'Bearer YOUR_API_TOKEN',
                    'Content-Type': 'application/json'
                }
                
                params = {'limit': limit, 'offset': offset}
                url = 'https://api.datahubportal.com/v1/contacts'
                
                for attempt in range(max_retries):
                    try:
                        response = requests.get(url, params=params, headers=headers)
                        
                        # Handle rate limiting
                        if response.status_code == 429:
                            retry_after = int(response.headers.get('retry-after', 5))
                            print(f"Rate limited, retrying after {retry_after}s...")
                            time.sleep(retry_after)
                            continue
                            
                        response.raise_for_status()
                        data = response.json()
                        
                        # Handle pagination
                        print(f"Got {len(data['data'])} contacts ({data['pagination']['total']} total)")
                        
                        return data
                        
                    except requests.exceptions.RequestException as e:
                        if attempt == max_retries - 1:
                            raise e
                        print(f"Request failed (attempt {attempt + 1}): {e}")
                        time.sleep(2 ** attempt)  # Exponential backoff
                        
                return None
            
            # Usage
            contacts = fetch_contacts_with_retry(limit=25, offset=0)
            
            # Iterate through all pages
            all_contacts = []
            offset = 0
            while True:
                page = fetch_contacts_with_retry(limit=50, offset=offset)
                all_contacts.extend(page['data'])
                if not page['pagination']['has_more']:
                    break
                offset += len(page['data'])
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/dir'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: Successfully retrieved contacts
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginationResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contact'
              examples:
                withContacts:
                  summary: List with contacts
                  value:
                    data:
                      - id: "con_a1b2c3d4"
                        name: "John Smith"
                        company: "Acme Corp"
                        emails:
                          - email: "john@acme.com"
                            type: "work"
                            is_primary: true
                        phones:
                          - phone: "+14155551234"
                            type: "mobile"
                            is_primary: true
                        created_at: "2024-01-15T10:30:00Z"
                        updated_at: "2024-01-15T10:30:00Z"
                      - id: "con_e5f6g7h8"
                        name: "Jane Doe"
                        emails:
                          - email: "jane.doe@example.com"
                            type: "personal"
                            is_primary: true
                        created_at: "2024-01-14T09:15:00Z"
                        updated_at: "2024-01-14T09:15:00Z"
                    total: 47
                    limit: 25
                    offset: 0
                    has_more: true
                emptyList:
                  summary: Empty contact list
                  value:
                    data: []
                    total: 0
                    limit: 25
                    offset: 0
                    has_more: false
                minimalContact:
                  summary: Contact with minimal fields (omit policy)
                  value:
                    data:
                      - id: "con_z9x8y7w6"
                        name: "Alice Johnson"
                        emails:
                          - email: "alice@example.com"
                            type: "personal"
                            is_primary: true
                        created_at: "2024-01-10T08:00:00Z"
                        updated_at: "2024-01-10T08:00:00Z"
                    total: 1
                    limit: 25
                    offset: 0
                    has_more: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/contacts/{id}:
    get:
      tags:
        - Contacts
      summary: Get contact by ID
      description: Returns a single contact by its unique identifier
      operationId: getContactById
      parameters:
        - name: id
          in: path
          required: true
          description: Contact identifier
          schema:
            type: string
            pattern: '^con_[a-z0-9]{8}$'
            example: "con_a1b2c3d4"
      responses:
        '200':
          description: Successfully retrieved contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
              examples:
                fullContact:
                  summary: Contact with all fields
                  value:
                    id: "con_a1b2c3d4"
                    name: "John Smith"
                    company: "Acme Corp"
                    emails:
                      - email: "john@acme.com"
                        type: "work"
                        is_primary: true
                      - email: "john.smith@personal.com"
                        type: "personal"
                        is_primary: false
                    phones:
                      - phone: "+14155551234"
                        type: "mobile"
                        is_primary: true
                      - phone: "+14155555678"
                        type: "work"
                        is_primary: false
                    address:
                      street: "123 Main St"
                      city: "San Francisco"
                      state: "CA"
                      postal_code: "94105"
                      country: "US"
                    tags: ["vip", "contractor"]
                    created_at: "2024-01-15T10:30:00Z"
                    updated_at: "2024-01-20T14:45:00Z"
                minimalContact:
                  summary: Contact with minimal fields
                  value:
                    id: "con_e5f6g7h8"
                    name: "Jane Doe"
                    emails:
                      - email: "jane@example.com"
                        type: "personal"
                        is_primary: true
                    created_at: "2024-01-14T09:15:00Z"
                    updated_at: "2024-01-14T09:15:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/jobs:
    get:
      tags:
        - Jobs
      summary: List jobs
      description: Returns a paginated list of jobs with optional status filtering
      operationId: listJobs
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/dir'
        - $ref: '#/components/parameters/q'
        - name: status
          in: query
          description: Filter by job status
          schema:
            type: string
            enum: [open, scheduled, in_progress, blocked, awaiting_review, completed, canceled, archived]
          example: "in_progress"
      responses:
        '200':
          description: Successfully retrieved jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginationResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Job'
              examples:
                activeJobs:
                  summary: List of active jobs
                  value:
                    data:
                      - id: "job_x1y2z3a4"
                        title: "HVAC Maintenance - Building A"
                        status: "in_progress"
                        status_updated_at: "2024-01-20T08:00:00Z"
                        priority: "high"
                        contact_id: "con_a1b2c3d4"
                        scheduled_start: "2024-01-20T09:00:00Z"
                        scheduled_end: "2024-01-20T17:00:00Z"
                        created_at: "2024-01-18T14:30:00Z"
                        updated_at: "2024-01-20T08:00:00Z"
                      - id: "job_b5c6d7e8"
                        title: "Electrical Inspection"
                        status: "scheduled"
                        status_updated_at: "2024-01-19T16:00:00Z"
                        priority: "medium"
                        contact_id: "con_e5f6g7h8"
                        scheduled_start: "2024-01-25T10:00:00Z"
                        created_at: "2024-01-19T16:00:00Z"
                        updated_at: "2024-01-19T16:00:00Z"
                    total: 23
                    limit: 25
                    offset: 0
                    has_more: false
                blockedJobs:
                  summary: Jobs with blocked status
                  value:
                    data:
                      - id: "job_f9g0h1i2"
                        title: "Plumbing Repair - Floor 3"
                        status: "blocked"
                        status_reason: "Awaiting parts delivery"
                        status_updated_at: "2024-01-19T11:30:00Z"
                        priority: "high"
                        contact_id: "con_a1b2c3d4"
                        created_at: "2024-01-17T09:00:00Z"
                        updated_at: "2024-01-19T11:30:00Z"
                    total: 3
                    limit: 25
                    offset: 0
                    has_more: false
                emptyJobs:
                  summary: Empty job list
                  value:
                    data: []
                    total: 0
                    limit: 25
                    offset: 0
                    has_more: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/jobs/{jobId}/files:
    get:
      tags:
        - Files
      summary: Get job files
      description: Returns files associated with a job, including signed URLs for access
      operationId: getJobFiles
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier
          schema:
            type: string
            pattern: '^job_[a-z0-9]{8}$'
            example: "job_x1y2z3a4"
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: kind
          in: query
          description: Filter by file kind
          schema:
            type: string
            enum: [document, photo, invoice, report, other]
          example: "photo"
      responses:
        '200':
          description: Successfully retrieved job files
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginationResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FileAsset'
              examples:
                withFiles:
                  summary: Job with multiple files
                  value:
                    data:
                      - id: "file_m3n4o5p6"
                        name: "site_photo_001.jpg"
                        kind: "photo"
                        size: 2457600
                        mime_type: "image/jpeg"
                        signed_url: "https://storage.example.com/files/abc123?token=xyz&expires=1705745400"
                        expires_at: "2024-01-20T10:30:00Z"
                        created_at: "2024-01-20T10:15:00Z"
                      - id: "file_q7r8s9t0"
                        name: "work_order.pdf"
                        kind: "document"
                        size: 145238
                        mime_type: "application/pdf"
                        signed_url: "https://storage.example.com/files/def456?token=abc&expires=1705745400"
                        expires_at: "2024-01-20T10:30:00Z"
                        created_at: "2024-01-19T14:00:00Z"
                    total: 5
                    limit: 25
                    offset: 0
                    has_more: false
                expiringSoon:
                  summary: Files with URLs expiring soon
                  value:
                    data:
                      - id: "file_u1v2w3x4"
                        name: "inspection_report.pdf"
                        kind: "report"
                        size: 523456
                        mime_type: "application/pdf"
                        signed_url: "https://storage.example.com/files/ghi789?token=qrs&expires=1705744500"
                        expires_at: "2024-01-20T10:15:00Z"
                        created_at: "2024-01-18T11:00:00Z"
                    total: 1
                    limit: 25
                    offset: 0
                    has_more: false
                noFiles:
                  summary: Job with no files
                  value:
                    data: []
                    total: 0
                    limit: 25
                    offset: 0
                    has_more: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: API key authentication using Bearer token

  parameters:
    limit:
      name: limit
      in: query
      description: Maximum number of items to return (1-100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      example: 25
    
    offset:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    
    sort:
      name: sort
      in: query
      description: Field to sort by
      schema:
        type: string
        enum: [created_at, updated_at, name, status, priority]
        default: created_at
      example: created_at
    
    dir:
      name: dir
      in: query
      description: Sort direction
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      example: desc
    
    q:
      name: q
      in: query
      description: Search query string
      schema:
        type: string
        minLength: 1
        maxLength: 100
      example: "smith"

  schemas:
    Contact:
      type: object
      required:
        - id
        - name
        - emails
        - created_at
        - updated_at
      properties:
        id:
          type: string
          pattern: '^con_[a-z0-9]{8}$'
          description: Unique contact identifier
          example: "con_a1b2c3d4"
        name:
          type: string
          description: Full name of the contact
          example: "John Smith"
        company:
          type: string
          description: Company or organization name
          example: "Acme Corp"
        emails:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ContactEmail'
        phones:
          type: array
          items:
            $ref: '#/components/schemas/ContactPhone'
        address:
          type: object
          properties:
            street:
              type: string
              example: "123 Main St"
            city:
              type: string
              example: "San Francisco"
            state:
              type: string
              example: "CA"
            postal_code:
              type: string
              example: "94105"
            country:
              type: string
              example: "US"
        tags:
          type: array
          items:
            type: string
          example: ["vip", "contractor"]
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp
          example: "2024-01-20T14:45:00Z"

    ContactEmail:
      type: object
      required:
        - email
        - type
        - is_primary
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
        type:
          type: string
          enum: [work, personal, other]
          example: "work"
        is_primary:
          type: boolean
          example: true

    ContactPhone:
      type: object
      required:
        - phone
        - type
        - is_primary
      properties:
        phone:
          type: string
          pattern: '^\+[1-9]\d{1,14}$'
          description: E.164 format
          example: "+14155551234"
        type:
          type: string
          enum: [mobile, work, home, other]
          example: "mobile"
        is_primary:
          type: boolean
          example: true

    Job:
      type: object
      required:
        - id
        - title
        - status
        - status_updated_at
        - priority
        - contact_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          pattern: '^job_[a-z0-9]{8}$'
          description: Unique job identifier
          example: "job_x1y2z3a4"
        title:
          type: string
          description: Job title or description
          example: "HVAC Maintenance - Building A"
        status:
          $ref: '#/components/schemas/JobStatus'
        status_reason:
          type: string
          description: Optional reason for status (especially for blocked)
          example: "Awaiting parts delivery"
        status_updated_at:
          type: string
          format: date-time
          description: When status last changed
          example: "2024-01-20T08:00:00Z"
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: "high"
        contact_id:
          type: string
          pattern: '^con_[a-z0-9]{8}$'
          description: Associated contact ID
          example: "con_a1b2c3d4"
        scheduled_start:
          type: string
          format: date-time
          description: Scheduled start time
          example: "2024-01-20T09:00:00Z"
        scheduled_end:
          type: string
          format: date-time
          description: Scheduled end time
          example: "2024-01-20T17:00:00Z"
        assignee_ids:
          type: array
          items:
            type: string
          example: ["usr_abc123", "usr_def456"]
        tags:
          type: array
          items:
            type: string
          example: ["maintenance", "hvac"]
        created_at:
          type: string
          format: date-time
          example: "2024-01-18T14:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-20T08:00:00Z"

    FileAsset:
      type: object
      required:
        - id
        - name
        - kind
        - size
        - mime_type
        - signed_url
        - expires_at
        - created_at
      properties:
        id:
          type: string
          pattern: '^file_[a-z0-9]{8}$'
          description: Unique file identifier
          example: "file_m3n4o5p6"
        name:
          type: string
          description: Original filename
          example: "site_photo_001.jpg"
        kind:
          $ref: '#/components/schemas/FileKind'
        size:
          type: integer
          description: File size in bytes
          example: 2457600
        mime_type:
          type: string
          description: MIME type
          example: "image/jpeg"
        signed_url:
          type: string
          format: uri
          description: Temporary signed URL for file access
          example: "https://storage.example.com/files/abc123?token=xyz&expires=1705745400"
        expires_at:
          type: string
          format: date-time
          description: When the signed URL expires (typically 15 minutes)
          example: "2024-01-20T10:30:00Z"
        metadata:
          type: object
          additionalProperties: true
          description: Optional file metadata
        created_at:
          type: string
          format: date-time
          example: "2024-01-20T10:15:00Z"

    PaginationResponse:
      type: object
      required:
        - total
        - limit
        - offset
        - has_more
      properties:
        total:
          type: integer
          description: Total number of items available
          example: 47
        limit:
          type: integer
          description: Maximum items returned
          example: 25
        offset:
          type: integer
          description: Number of items skipped
          example: 0
        has_more:
          type: boolean
          description: Whether more items exist
          example: true

    Error:
      type: object
      required:
        - type
        - title
        - status
        - code
        - detail
        - traceId
      properties:
        type:
          type: string
          format: uri
          description: URI reference for error type
          example: "https://api.portal.example.com/errors/validation"
        title:
          type: string
          description: Short error description
          example: "Validation Error"
        status:
          type: integer
          description: HTTP status code
          example: 422
        code:
          type: string
          description: Application-specific error code
          example: "VALIDATION_FAILED"
        detail:
          type: string
          description: Detailed error message
          example: "The provided email format is invalid"
        traceId:
          type: string
          description: Request trace identifier for debugging
          example: "abc123-def456-ghi789"
        errors:
          type: array
          description: Field-specific validation errors
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field name that failed validation
          example: "email"
        message:
          type: string
          description: Validation error message
          example: "Must be a valid email address"
        code:
          type: string
          description: Validation rule that failed
          example: "format.email"

    JobStatus:
      type: string
      enum: [open, scheduled, in_progress, blocked, awaiting_review, completed, canceled, archived]
      description: Canonical job status values
      example: "in_progress"

    FileKind:
      type: string
      enum: [document, photo, invoice, report, other]
      description: File classification types
      example: "photo"

  headers:
    X-RateLimit-Limit:
      description: The number of requests allowed in the current window
      schema:
        type: integer
        example: 60
    
    X-RateLimit-Remaining:
      description: The number of requests remaining in the current window
      schema:
        type: integer
        example: 45
    
    X-RateLimit-Reset:
      description: Unix timestamp when the current window resets
      schema:
        type: integer
        example: 1705745400
    
    Retry-After:
      description: Seconds until the client should retry the request
      schema:
        type: integer
        example: 30

  responses:
    BadRequest:
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://api.portal.example.com/errors/bad-request"
            title: "Bad Request"
            status: 400
            code: "BAD_REQUEST"
            detail: "Invalid query parameter format"
            traceId: "req_abc123def456"

    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://api.portal.example.com/errors/unauthorized"
            title: "Unauthorized"
            status: 401
            code: "UNAUTHORIZED"
            detail: "Bearer token is missing or invalid"
            traceId: "req_ghi789jkl012"

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            tenantAccess:
              summary: Tenant access denied
              value:
                type: "https://datatracker.ietf.org/doc/html/rfc7231#section-6.5.3"
                title: "Forbidden"
                status: 403
                code: "TENANT_ACCESS_DENIED"
                detail: "Current API key does not have access to this tenant's data"
                traceId: "tr_4a2b8c3d1e5f"
            insufficientScope:
              summary: Insufficient API scope
              value:
                type: "https://datatracker.ietf.org/doc/html/rfc7231#section-6.5.3"
                title: "Forbidden"
                status: 403
                code: "INSUFFICIENT_SCOPE"
                detail: "API key lacks required scope: contacts:read"
                traceId: "tr_9f1e2d3c4b5a"
            resourceOwnership:
              summary: Resource ownership violation
              value:
                type: "https://datatracker.ietf.org/doc/html/rfc7231#section-6.5.3"
                title: "Forbidden"
                status: 403
                code: "RESOURCE_OWNERSHIP_VIOLATION"
                detail: "Access denied: resource belongs to different tenant"
                traceId: "tr_6g7h8i9j0k1l"

    NotFound:
      description: Not found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://api.portal.example.com/errors/not-found"
            title: "Not Found"
            status: 404
            code: "NOT_FOUND"
            detail: "Resource not found"
            traceId: "req_stu901vwx234"

    ValidationError:
      description: Validation error - Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalidStatus:
              summary: Invalid job status value
              value:
                type: "https://datatracker.ietf.org/doc/html/rfc4918#section-11.2"
                title: "Unprocessable Entity"
                status: 422
                code: "INVALID_STATUS_VALUE"
                detail: "Status must be one of: open, scheduled, in_progress, blocked, awaiting_review, completed, canceled, archived"
                traceId: "tr_1m2n3o4p5q6r"
                errors:
                  - field: "status"
                    message: "Invalid status value: 'pending'"
                    code: "ENUM_VALIDATION_FAILED"
            invalidPagination:
              summary: Invalid pagination parameters
              value:
                type: "https://datatracker.ietf.org/doc/html/rfc4918#section-11.2"
                title: "Unprocessable Entity"
                status: 422
                code: "INVALID_PAGINATION_PARAMS"
                detail: "Pagination parameters are invalid"
                traceId: "tr_7s8t9u0v1w2x"
                errors:
                  - field: "limit"
                    message: "Limit must be between 1 and 100"
                    code: "RANGE_VALIDATION_FAILED"
                  - field: "offset"
                    message: "Offset must be non-negative"
                    code: "MIN_VALIDATION_FAILED"
            invalidSortField:
              summary: Invalid sort field
              value:
                type: "https://datatracker.ietf.org/doc/html/rfc4918#section-11.2"
                title: "Unprocessable Entity" 
                status: 422
                code: "INVALID_SORT_FIELD"
                detail: "Sort field is not supported for this resource"
                traceId: "tr_3y4z5a6b7c8d"
                errors:
                  - field: "sort"
                    message: "Field 'email' is not sortable. Allowed fields: name, company, created_at, updated_at"
                    code: "SORT_FIELD_NOT_ALLOWED"
                code: "enum.invalid"

    RateLimited:
      description: Too many requests - Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://api.portal.example.com/errors/rate-limit"
            title: "Too Many Requests"
            status: 429
            code: "RATE_LIMIT_EXCEEDED"
            detail: "Rate limit exceeded. Please retry after 30 seconds"
            traceId: "req_efg123hij456"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: "https://api.portal.example.com/errors/internal"
            title: "Internal Server Error"
            status: 500
            code: "INTERNAL_ERROR"
            detail: "An unexpected error occurred"
            traceId: "req_klm789nop012"