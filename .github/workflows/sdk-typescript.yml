name: TypeScript SDK Release

on:
  push:
    tags:
      - 'sdk-ts-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK Version (e.g., 1.0.0-rc.2)'
        required: true
        type: string

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Extract version from tag or input
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/sdk-ts-v}" >> $GITHUB_OUTPUT
        fi
        
    - name: Install OpenAPI Generator CLI
      run: npm install -g @openapitools/openapi-generator-cli@2.13.4
      
    - name: Generate TypeScript SDK
      run: |
        npx @openapitools/openapi-generator-cli generate \
          -g typescript-fetch \
          -i openapi/openapi.yaml \
          -o sdks/typescript \
          -p npmName=@datahubportal/portal-api \
          -p npmVersion=${{ steps.version.outputs.version }} \
          -p supportsES6=true \
          -p useSingleRequestParameter=true
          
    - name: Update package.json
      run: |
        cd sdks/typescript
        cat > package.json << 'EOF'
        {
          "name": "@datahubportal/portal-api",
          "version": "${{ steps.version.outputs.version }}",
          "description": "Official TypeScript SDK for Portal API - Contact, job, and file management",
          "author": "DataHub Portal Team",
          "license": "Proprietary",
          "repository": {
            "type": "git",
            "url": "https://github.com/Work-Ninjas/portal-api-sdk-ts.git"
          },
          "homepage": "https://docs.datahubportal.com",
          "keywords": [
            "portal-api",
            "datahubportal",
            "contacts",
            "jobs",
            "files",
            "typescript",
            "sdk"
          ],
          "type": "module",
          "main": "./dist/index.js",
          "typings": "./dist/index.d.ts",
          "module": "./dist/esm/index.js",
          "exports": {
            ".": {
              "import": "./dist/esm/index.js",
              "require": "./dist/index.js",
              "types": "./dist/index.d.ts"
            }
          },
          "sideEffects": false,
          "engines": {
            "node": ">=18"
          },
          "scripts": {
            "build": "tsc && tsc -p tsconfig.esm.json",
            "prepare": "npm run build",
            "test": "echo \"Tests coming soon\"",
            "lint": "echo \"Linting coming soon\""
          },
          "devDependencies": {
            "typescript": "^4.0 || ^5.0"
          }
        }
        EOF
        
    - name: Copy custom README
      run: |
        cd sdks/typescript
        cat > README.md << 'EOF'
        # @datahubportal/portal-api

        Official TypeScript SDK for the Portal API - Contact, job, and file management.

        [![npm version](https://badge.fury.io/js/@datahubportal%2Fportal-api.svg)](https://www.npmjs.com/package/@datahubportal/portal-api)
        [![Documentation](https://img.shields.io/badge/docs-live-brightgreen?style=flat&logo=book&logoColor=white)](https://docs.datahubportal.com)

        ## Quick Start

        ### Installation

        ```bash
        npm install @datahubportal/portal-api
        # or
        yarn add @datahubportal/portal-api
        ```

        ### Basic Usage

        ```typescript
        import { Configuration, ContactsApi, JobsApi, FilesApi } from "@datahubportal/portal-api";

        const config = new Configuration({
          basePath: "https://api.datahubportal.com/v1",
          accessToken: process.env.API_KEY!,
        });

        const contacts = new ContactsApi(config);
        const jobs = new JobsApi(config);
        const files = new FilesApi(config);

        (async () => {
          const contactsList = await contacts.listContacts({ limit: 25, q: "john" });
          console.log(contactsList.data?.data?.length);

          const contact = await contacts.getContactById({ id: "con_a1b2c3d4" });
          console.log(contact.data?.name);

          const jobsList = await jobs.listJobs({ status: "in_progress", limit: 5 });
          console.log(jobsList.data?.data?.map(x => x.status));

          const filesList = await files.getJobFiles({ 
            jobId: "job_x1y2z3a4", 
            kind: "document", 
            limit: 2 
          });
          console.log(filesList.data?.data?.[0]?.signed_url);
        })();
        ```

        ## Documentation

        - 📚 [Full Documentation](https://docs.datahubportal.com)
        - 🔧 [Interactive Playground](https://docs.datahubportal.com)
        - 🚀 [SDK Quickstarts](https://docs.datahubportal.com/quickstarts)
        - 🔑 [Getting an API Key](https://docs.datahubportal.com/getting-api-key)

        ## Support

        - 📧 Email: [api-support@datahubportal.com](mailto:api-support@datahubportal.com)
        - 🐛 Issues: [GitHub Issues](https://github.com/Work-Ninjas/portal-api-docs/issues)

        Response time: 24 hours (business days)

        ## License

        Proprietary - DataHub Portal Team

        ---

        Generated with OpenAPI Generator from Portal API v1.0.0
        EOF
        
    - name: Build SDK
      run: |
        cd sdks/typescript
        npm install
        npm run build
        
    - name: Run tests
      run: |
        cd sdks/typescript
        npm test
        
    - name: Lint code
      run: |
        cd sdks/typescript
        npm run lint
        
    - name: Publish to npm
      run: |
        cd sdks/typescript
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: sdk-ts-v${{ steps.version.outputs.version }}
        release_name: TypeScript SDK v${{ steps.version.outputs.version }}
        body: |
          ## TypeScript SDK Release v${{ steps.version.outputs.version }}
          
          🚀 **Published to npm**: [@datahubportal/portal-api@${{ steps.version.outputs.version }}](https://www.npmjs.com/package/@datahubportal/portal-api)
          
          ### Installation
          ```bash
          npm install @datahubportal/portal-api@${{ steps.version.outputs.version }}
          ```
          
          ### Changes
          - Generated from Portal API OpenAPI specification
          - Full TypeScript support with type definitions
          - Support for all Portal API endpoints
          
          ### Documentation
          - 📚 [API Documentation](https://docs.datahubportal.com)
          - 🚀 [SDK Quickstarts](https://docs.datahubportal.com/quickstarts)
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}