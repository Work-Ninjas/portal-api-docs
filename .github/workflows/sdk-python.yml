name: Python SDK Release

on:
  push:
    tags:
      - 'sdk-py-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK Version (e.g., 1.0.0rc2)'
        required: true
        type: string

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Setup Node.js (for OpenAPI Generator)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Extract version from tag or input
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/sdk-py-v}" >> $GITHUB_OUTPUT
        fi
        
    - name: Install OpenAPI Generator CLI
      run: npm install -g @openapitools/openapi-generator-cli@2.13.4
      
    - name: Generate Python SDK
      run: |
        npx @openapitools/openapi-generator-cli generate \
          -g python \
          -i openapi/openapi.yaml \
          -o sdks/python \
          -p packageName=datahub_portal_api \
          -p projectName="datahub-portal-api" \
          -p packageVersion=${{ steps.version.outputs.version }}
          
    - name: Update setup.py
      run: |
        cd sdks/python
        cat > setup.py << 'EOF'
        from setuptools import setup, find_packages

        NAME = "datahub-portal-api"
        VERSION = "${{ steps.version.outputs.version }}"

        # Read requirements from requirements.txt
        with open("requirements.txt") as f:
            REQUIRES = f.read().splitlines()

        setup(
            name=NAME,
            version=VERSION,
            description="Official Python SDK for Portal API - Contact, job, and file management",
            author="DataHub Portal Team",
            author_email="api-support@datahubportal.com",
            url="https://github.com/Work-Ninjas/portal-api-sdk-py",
            project_urls={
                "Documentation": "https://docs.datahubportal.com",
                "Source": "https://github.com/Work-Ninjas/portal-api-sdk-py",
                "Tracker": "https://github.com/Work-Ninjas/portal-api-docs/issues",
            },
            keywords=["portal-api", "datahubportal", "contacts", "jobs", "files", "python", "sdk"],
            classifiers=[
                "Development Status :: 4 - Beta",
                "Intended Audience :: Developers",
                "License :: Other/Proprietary License",
                "Operating System :: OS Independent",
                "Programming Language :: Python :: 3",
                "Programming Language :: Python :: 3.9",
                "Programming Language :: Python :: 3.10",
                "Programming Language :: Python :: 3.11",
                "Programming Language :: Python :: 3.12",
                "Topic :: Software Development :: Libraries :: Python Modules",
            ],
            package_dir={"": "."},
            packages=find_packages(),
            include_package_data=True,
            install_requires=REQUIRES,
            python_requires=">=3.9",
            long_description_content_type="text/markdown",
        )
        EOF
        
    - name: Copy custom README
      run: |
        cd sdks/python
        cat > README.md << 'EOF'
        # datahub-portal-api

        Official Python SDK for the Portal API - Contact, job, and file management.

        [![PyPI version](https://badge.fury.io/py/datahub-portal-api.svg)](https://pypi.org/project/datahub-portal-api)
        [![Documentation](https://img.shields.io/badge/docs-live-brightgreen?style=flat&logo=book&logoColor=white)](https://docs.datahubportal.com)

        ## Quick Start

        ### Installation

        ```bash
        pip install datahub-portal-api
        # or
        poetry add datahub-portal-api
        ```

        ### Basic Usage

        ```python
        from datahub_portal_api import Configuration, ApiClient
        from datahub_portal_api.api.contacts_api import ContactsApi
        from datahub_portal_api.api.jobs_api import JobsApi
        from datahub_portal_api.api.files_api import FilesApi

        config = Configuration()
        config.host = "https://api.datahubportal.com/v1"
        config.access_token = "YOUR_API_KEY"

        with ApiClient(config) as client:
            contacts = ContactsApi(client)
            jobs = JobsApi(client)
            files = FilesApi(client)

            resp = contacts.list_contacts(limit=25, q="john")
            print(len(resp.data.data))

            contact = contacts.get_contact_by_id(id="con_a1b2c3d4")
            print(contact.name)

            job_resp = jobs.list_jobs(status="in_progress", limit=5)
            print([j.status for j in job_resp.data.data])

            file_resp = files.get_job_files(job_id="job_x1y2z3a4", kind="document", limit=2)
            print(file_resp.data.data[0].signed_url)
        ```

        ## Documentation

        - 📚 [Full Documentation](https://docs.datahubportal.com)
        - 🔧 [Interactive Playground](https://docs.datahubportal.com)
        - 🚀 [SDK Quickstarts](https://docs.datahubportal.com/quickstarts)
        - 🔑 [Getting an API Key](https://docs.datahubportal.com/getting-api-key)

        ## Support

        - 📧 Email: [api-support@datahubportal.com](mailto:api-support@datahubportal.com)
        - 🐛 Issues: [GitHub Issues](https://github.com/Work-Ninjas/portal-api-docs/issues)

        Response time: 24 hours (business days)

        ## License

        Proprietary - DataHub Portal Team

        ---

        Generated with OpenAPI Generator from Portal API v1.0.0
        EOF
        
    - name: Install dependencies
      run: |
        cd sdks/python
        python -m pip install --upgrade pip
        pip install build twine pytest
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd sdks/python
        python -m pytest test/ -v || true  # Allow tests to fail for now
        
    - name: Build package
      run: |
        cd sdks/python
        python -m build
        
    - name: Check package
      run: |
        cd sdks/python
        python -m twine check dist/*
        
    - name: Publish to PyPI
      run: |
        cd sdks/python
        python -m twine upload dist/*
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: sdk-py-v${{ steps.version.outputs.version }}
        release_name: Python SDK v${{ steps.version.outputs.version }}
        body: |
          ## Python SDK Release v${{ steps.version.outputs.version }}
          
          🚀 **Published to PyPI**: [datahub-portal-api@${{ steps.version.outputs.version }}](https://pypi.org/project/datahub-portal-api/)
          
          ### Installation
          ```bash
          pip install datahub-portal-api==${{ steps.version.outputs.version }}
          ```
          
          ### Changes
          - Generated from Portal API OpenAPI specification
          - Full Python type hints support
          - Support for all Portal API endpoints
          
          ### Documentation
          - 📚 [API Documentation](https://docs.datahubportal.com)
          - 🚀 [SDK Quickstarts](https://docs.datahubportal.com/quickstarts)
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}